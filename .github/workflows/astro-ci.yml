name: astro-ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - uses: lycheeverse/lychee-action@v1
        with:
          # This exclude is load-bearing; do not remove.
          # linkedin.com: LinkedIn blocks automated clients, answering 999 from
          #   some IPs and 403/429 from GitHub runners. The latter counts as an
          #   error, so leaving it in makes this required check fail at random.
          # External links other than these are still checked.
          args: --no-progress --exclude 'linkedin\.com' site/dist
          format: json
          output: lychee/out.json
          fail: false
      - name: Fail on broken links (timeouts are not fatal)
        run: |
          errors=$(jq '.errors' lychee/out.json)
          echo "lychee non-timeout errors: $errors"
          test "$errors" -eq 0
