name: astro-ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      # A step of build, not a job of its own: it needs the same dist the build
      # just produced, and folding it in keeps the required checks at three.
      - name: Meta descriptions within Bing's 155 character limit
        run: npm run check:meta
        working-directory: site
      # lychee does not cover llms.txt: it reads the HTML, and our own domain is
      # excluded from it. Nothing else links these URLs, so a renamed route
      # would rot the file silently.
      - name: llms.txt links point at routes that exist
        run: npm run check:llms
        working-directory: site

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - uses: lycheeverse/lychee-action@v1
        with:
          # These excludes are load-bearing; do not remove.
          # okarthur.com: our own canonical/og:url tags point at the live site.
          #   A page added in a PR does not exist there until merge and deploy,
          #   so lychee 404s on its own canonical tag. Do not drop this again —
          #   it was removed once (9eb5392) on the mistaken belief it was
          #   obsolete, which broke the very next PR that added a page.
          # linkedin.com: LinkedIn blocks automated clients, answering 999 from
          #   some IPs and 403/429 from GitHub runners. The latter counts as an
          #   error, so leaving it in makes this required check fail at random.
          # open.spotify.com, de.bentley.com, ice.org.uk and emerald.com: same
          #   anti-bot behaviour against GitHub runners. The linked works are
          #   verified by hand.
          # External links other than these are still checked.
          args: --no-progress --exclude '^https://okarthur\.com' --exclude 'linkedin\.com' --exclude 'open\.spotify\.com' --exclude 'de\.bentley\.com' --exclude 'ice\.org\.uk' --exclude 'emerald\.com' site/dist
          format: json
          output: lychee/out.json
          fail: false
      - name: Fail on broken links (timeouts are not fatal)
        run: |
          errors=$(jq '.errors' lychee/out.json)
          echo "lychee non-timeout errors: $errors"
          test "$errors" -eq 0
